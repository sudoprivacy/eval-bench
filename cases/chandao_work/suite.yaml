target:
  type: skill
  path: /home/user/chandao-cli/skills/chandao-work
  # chandao-work's SKILL.md Read-requires its sibling chandao-shared
  # skill. Expose that dir too so the agent's Read tool can find it.
  extra_add_dirs:
    - /home/user/chandao-cli/skills/chandao-shared
  allowed_tools:
    - Read
    - Write
    - Bash
    - Glob
    - Grep
run:
  concurrency: 1     # real server, keep it gentle
  trials: 1
